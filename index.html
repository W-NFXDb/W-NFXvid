<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-NFX Tutorial System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('bg.jpg') center/cover no-repeat;
            opacity: 0.55;
            filter: blur(15px);
            transform: scale(1.1);
        }

        .main-container {
            position: relative;
            width: 320px;
            height: 568px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .main-container.is-full {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            border: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Bottom Controls Wrapper */
        .controls-wrapper {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 110;
        }

        /* Seekbar Container */
        .progress-area {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2ff, #0072ff);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px #00f2ff;
        }

        /* Play/Pause & Fullscreen Buttons */
        .control-btn {
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #00f2ff;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            flex-shrink: 0;
        }

        .control-btn:hover {
            background: rgba(0, 242, 255, 0.3);
            transform: scale(1.1);
        }

        #mute-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            background: rgba(0, 242, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #00f2ff;
            pointer-events: none;
            z-index: 200;
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div id="mute-hint">Tap Video untuk Suara 🔊</div>

    <main class="main-container" id="videoContainer">
        <video id="myVideo" autoplay loop playsinline muted onclick="togglePlay()">
            <source src="tutorial.mp4" type="video/mp4">
        </video>

        <div class="controls-wrapper">
            <div class="control-btn" onclick="togglePlay()">
                <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/> </svg>
            </div>

            <div class="progress-area" id="progressArea">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="control-btn" onclick="toggleFullscreen()">
                <svg id="fs-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                </svg>
            </div>
        </div>
    </main>

    <script>
        const container = document.getElementById('videoContainer');
        const video = document.getElementById('myVideo');
        const hint = document.getElementById('mute-hint');
        const playIcon = document.getElementById('play-icon');
        const fsIcon = document.getElementById('fs-icon');
        const progressBar = document.getElementById('progressBar');
        const progressArea = document.getElementById('progressArea');

        // Fungsi Play & Pause + Unmute otomatis saat pertama klik
        function togglePlay() {
            if (video.muted) {
                video.muted = false;
                hint.style.opacity = '0';
            }

            if (video.paused) {
                video.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Icon Pause
            } else {
                video.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Icon Play
            }
        }

        // Fungsi Toggle Fullscreen
        function toggleFullscreen() {
            container.classList.toggle('is-full');
            if (container.classList.contains('is-full')) {
                fsIcon.innerHTML = '<path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/>';
            } else {
                fsIcon.innerHTML = '<path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>';
            }
        }

        // Update Seekbar
        video.addEventListener("timeupdate", (e) => {
            const currentTime = e.target.currentTime;
            const duration = e.target.duration;
            let progressWidth = (currentTime / duration) * 100;
            progressBar.style.width = `${progressWidth}%`;
        });

        // Geser Durasi
        progressArea.addEventListener("click", (e) => {
            let videoDuration = video.duration;
            let progressWidthVal = progressArea.clientWidth;
            let clickedOffsetX = e.offsetX;
            video.currentTime = (clickedOffsetX / progressWidthVal) * videoDuration;
        });
    </script>
</body>
</html>
